services:
  postgres:
    image: postgres:16-alpine
    container_name: rivlayx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: rivlayx
      POSTGRES_PASSWORD: rivlayx_dev
      POSTGRES_DB: rivlayx_dev
    ports:
      - '5432:5432'
    volumes:
      - rivlayx_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U rivlayx -d rivlayx_dev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rivlayx_postgres_data:
